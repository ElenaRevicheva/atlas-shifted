<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Atlas Shifted — Earth globe with green continents on black -->
  <rect width="32" height="32" rx="7" fill="#0a0b0f"/>
  <rect x="0.7" y="0.7" width="30.6" height="30.6" rx="6.3" fill="none" stroke="#1f4a44" stroke-width="1.2"/>
  <defs>
    <clipPath id="globe"><circle cx="16" cy="16" r="9.4"/></clipPath>
  </defs>
  <!-- ocean -->
  <circle cx="16" cy="16" r="9.4" fill="#0b211c"/>
  <!-- continents (green landmasses), clipped to the sphere -->
  <g clip-path="url(#globe)" fill="#5eead4">
    <path d="M11.2 7.4 C 8.9 8.0 8.0 10.4 9.2 12.2 C 10.0 13.4 9.3 15.0 10.4 16.2 C 11.0 16.9 11.9 16.6 11.8 15.5 C 12.9 14.7 12.2 12.7 13.0 11.4 C 13.8 10.1 13.2 8.2 11.2 7.4 Z"/>
    <path d="M10.7 17.8 C 10.1 19.6 11.0 22.4 12.6 23.2 C 13.6 23.6 13.4 21.4 12.8 20.2 C 12.3 19.1 12.0 17.3 10.7 17.8 Z"/>
    <path d="M17.6 8.9 C 20.4 8.4 23.1 10.0 23.2 12.4 C 23.3 14.4 21.1 14.9 20.4 16.7 C 19.7 18.6 20.5 21.2 18.7 21.7 C 17.4 22.0 17.5 19.4 17.9 17.7 C 16.8 16.0 17.5 13.2 16.9 11.6 C 16.6 10.4 16.5 9.2 17.6 8.9 Z"/>
    <path d="M20.8 18.8 C 22.3 18.7 23.4 20.0 22.8 21.4 C 22.3 22.5 20.6 22.0 20.2 20.7 C 19.9 19.9 19.8 18.9 20.8 18.8 Z"/>
  </g>
  <!-- sphere rim -->
  <circle cx="16" cy="16" r="9.4" fill="none" stroke="#5eead4" stroke-width="1.6"/>
</svg>

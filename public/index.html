<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WHITESPACE — find the ad nobody is running yet</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="apple-touch-icon" href="favicon.svg" />
<style>
  :root{
    --bg:#0a0b0f; --panel:#12141c; --panel2:#171a24; --line:#242838;
    --ink:#e8ebf2; --mut:#8b90a3; --dim:#5b6072;
    --acc:#5eead4; --acc2:#a78bfa; --warn:#fbbf24; --hot:#fb7185; --ok:#34d399;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 700px at 70% -10%,#1a1d2e 0%,var(--bg) 55%);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:32px 22px 80px}
  header{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:6px}
  .brand{font-family:var(--mono);font-weight:700;font-size:30px;letter-spacing:.18em}
  .brand b{color:var(--acc)}
  .by{font-size:12px;color:var(--dim);font-family:var(--mono)}
  .by a{color:var(--acc2);text-decoration:none}
  .langsw{display:inline-flex;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-left:10px;vertical-align:middle}
  .langsw button{background:#0c0e15;color:var(--dim);border:0;padding:4px 10px;font-size:11px;font-family:var(--mono);cursor:pointer;font-weight:700}
  .langsw button.on{background:#0c1a17;color:var(--acc)}
  .tag{color:var(--mut);font-size:15px;margin:8px 0 26px;max-width:680px;line-height:1.5}
  .tag b{color:var(--ink);font-weight:600}
  .card{background:linear-gradient(180deg,var(--panel),#0e1017);border:1px solid var(--line);border-radius:16px;padding:20px}
  .modes{display:flex;gap:8px;margin-bottom:14px}
  .mode{background:#0c0e15;color:var(--mut);border:1px solid var(--line);border-radius:10px;padding:9px 14px;font-size:13.5px;font-weight:600;cursor:pointer}
  .mode span{color:var(--dim);font-weight:400;font-size:11.5px;font-family:var(--mono)}
  .mode.on{border-color:var(--acc);color:var(--ink);background:#0c1a17}
  .inrow{display:flex;gap:10px;flex-wrap:wrap}
  input{flex:1;min-width:240px;background:#0c0e15;border:1px solid var(--line);border-radius:10px;color:var(--ink);font-size:16px;padding:14px 16px;outline:none;font-family:var(--sans)}
  input:focus{border-color:var(--acc)}
  button{background:var(--acc);color:#04231f;font-weight:700;border:0;border-radius:10px;padding:0 22px;font-size:15px;cursor:pointer;font-family:var(--sans)}
  button:disabled{opacity:.5;cursor:default}
  .chips{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
  .chip{font-size:12.5px;color:var(--mut);border:1px solid var(--line);border-radius:999px;padding:6px 12px;cursor:pointer;background:#0c0e15}
  .chip:hover{border-color:var(--acc2);color:var(--ink)}
  .status{margin:18px 0 0;display:none}
  .bar{height:5px;background:#0c0e15;border-radius:4px;overflow:hidden;border:1px solid var(--line)}
  .fill{height:100%;width:0;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .4s ease}
  .feed{font-family:var(--mono);font-size:12.5px;margin-top:12px;max-height:168px;overflow:auto;color:var(--mut);border-left:2px solid var(--line);padding-left:12px}
  .feed div{padding:2px 0}
  .feed .st{color:var(--acc)}
  .feed .er{color:var(--hot)}
  .results{margin-top:26px;display:none}
  .sec{margin-top:22px}
  .h{font-family:var(--mono);font-size:12px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;margin:0 0 12px}
  .rec{background:linear-gradient(180deg,#15212b,#101820);border:1px solid #1f4a44;border-radius:16px;padding:22px}
  .rec .lab{font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--acc);text-transform:uppercase}
  .rec h2{margin:8px 0 10px;font-size:24px;line-height:1.25}
  .rec p{color:var(--mut);margin:0 0 14px;line-height:1.55}
  .conf{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;color:var(--ink);background:#04231f;border:1px solid #1f4a44;border-radius:999px;padding:5px 12px}
  .adj{margin-top:12px;font-size:12.5px;color:var(--dim);font-family:var(--mono)}
  .adj b{color:var(--acc2)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:720px){.grid{grid-template-columns:1fr}}
  .tile{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:16px}
  .tile h3{margin:0 0 8px;font-size:14px}
  .tile .ct{font-family:var(--mono);font-size:12px;color:var(--mut);line-height:1.55}
  .cta{display:inline-block;margin-top:8px;font-size:11px;font-family:var(--mono);color:var(--acc);border:1px solid #1f4a44;border-radius:6px;padding:3px 8px}
  .lane{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px}
  .sat{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.08em}
  .sat.heavy{background:#3b1418;color:var(--hot);border:1px solid #5a1d22}
  .sat.moderate{background:#3a2e10;color:var(--warn);border:1px solid #5a4715}
  .sat.light{background:#10231a;color:var(--ok);border:1px solid #1d4a36}
  .lane .ang{flex:1}
  .lane .em{font-family:var(--mono);font-size:11.5px;color:var(--dim)}
  .ev{font-size:13px;color:var(--mut);padding:9px 0;border-bottom:1px solid var(--line);line-height:1.5}
  .ev a{color:var(--acc2);text-decoration:none;font-family:var(--mono);font-size:11px}
  .ev b{color:var(--ink)}
  .alt{font-size:13.5px;color:var(--mut);padding:8px 0;border-bottom:1px solid var(--line)}
  .alt b{color:var(--ink)}
  .alt .c{font-family:var(--mono);font-size:11px;color:var(--acc)}
  .meta{margin-top:20px;font-family:var(--mono);font-size:11.5px;color:var(--dim);line-height:1.6}
  .deg{margin-top:14px;background:#2a210c;border:1px solid #5a4715;color:var(--warn);border-radius:10px;padding:12px 14px;font-size:12.5px;font-family:var(--mono);display:none}
  .how{margin-top:22px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  @media(max-width:760px){.how{grid-template-columns:1fr}}
  .howstep{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:15px 16px;font-size:13px;color:var(--mut);line-height:1.5}
  .hn{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;background:#04231f;border:1px solid #1f4a44;color:var(--acc);font-family:var(--mono);font-size:12px;margin-right:8px}
  .footnote{margin-top:18px;text-align:center;font-family:var(--mono);font-size:11.5px;color:var(--dim);line-height:1.7}
  .footnote a{color:var(--acc2);text-decoration:none}
  .trackcta{margin-top:20px;padding:14px 16px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;display:none;flex-direction:column;align-items:stretch;gap:10px}
  .trackcta.show{display:flex}
  .trackcta p{margin:0;font-size:13.5px;color:var(--mut);line-height:1.5}
  .trackcta p b{color:var(--ink);font-weight:600}
  .trackbtn{display:block;text-align:center;background:transparent;color:var(--acc) !important;font-weight:600;text-decoration:none !important;border:1px solid #1f4a44;border-radius:10px;padding:11px 18px;font-size:14px;cursor:pointer}
  .trackbtn:hover{background:#0c1a17}
  .trackcta .sub{font-family:var(--mono);font-size:11px;color:var(--dim);text-align:left;line-height:1.45}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="brand">WHITE<b>SPACE</b></div>
    </div>
    <div class="by"><span id="byLine">an AIdeazz agent</span> · <a href="https://aideazz.xyz/sop-ai-ops.html" target="_blank" rel="noopener">AI Ops SOP ↗</a> · <a href="atlas.html" id="byAtlas">← Atlas radar</a><span class="langsw"><button id="langEN">EN</button><button id="langES">ES</button></span></div>
  </header>
  <div class="tag" id="tagMain"></div>
  <div class="tag" id="tagHonest" style="font-size:12.5px;color:var(--dim);margin-top:-14px"></div>

  <div class="card">
    <div class="modes" id="modes">
      <button class="mode on" data-mode="media_buyer" id="modeMb"></button>
      <button class="mode" data-mode="content" id="modeCt"></button>
    </div>
    <div class="inrow">
      <input id="q" placeholder="" autocomplete="off" />
      <button id="go"></button>
    </div>
    <div class="chips" id="chips"></div>

    <div class="status" id="status">
      <div class="bar"><div class="fill" id="fill"></div></div>
      <div class="feed" id="feed"></div>
    </div>
  </div>

  <div class="results" id="results">
    <div class="deg" id="deg"></div>

    <div class="sec">
      <div class="rec">
        <div class="lab" id="recLab"></div>
        <h2 id="recAngle"></h2>
        <p id="recRationale"></p>
        <span class="conf" id="recConf"></span>
        <div class="adj" id="recAdj"></div>
      </div>
    </div>

    <!-- media_buyer sections -->
    <div class="sec mb">
      <div class="h" id="hAdcopy"></div>
      <div class="grid" id="adcopy"></div>
    </div>
    <div class="sec mb">
      <div class="h" id="hLp"></div>
      <div class="tile" id="lp"></div>
    </div>

    <!-- content sections -->
    <div class="sec ct">
      <div class="h" id="hBlog"></div>
      <div class="tile" id="blog"></div>
    </div>
    <div class="sec ct">
      <div class="h" id="hSocial"></div>
      <div class="grid" id="social"></div>
    </div>
    <div class="sec ct">
      <div class="h" id="hHub"></div>
      <div class="tile" id="hub"></div>
    </div>

    <div class="sec">
      <div class="h" id="hLanes"></div>
      <div id="lanes"></div>
    </div>

    <div class="sec" id="altSec">
      <div class="h" id="hAlts"></div>
      <div id="alts"></div>
    </div>

    <div class="sec">
      <div class="h" id="hEv"></div>
      <div id="evidence"></div>
    </div>

    <div class="trackcta" id="trackCtaBottom">
      <p><span id="trackP1"></span> <b id="trackLabel"></b> <span id="trackP2"></span></p>
      <a id="trackLinkBottom" class="trackbtn" href="atlas.html"></a>
      <div class="sub" id="trackSub"></div>
    </div>

    <div class="meta" id="meta"></div>
  </div>

  <div class="how">
    <div class="howstep"><span class="hn">1</span><span id="how1"></span></div>
    <div class="howstep"><span class="hn">2</span><span id="how2"></span></div>
    <div class="howstep"><span class="hn">3</span><span id="how3"></span></div>
  </div>
  <div class="footnote" id="footnote"></div>

</div>

<script>
const EXAMPLES = {
  media_buyer: ['medicare advantage','solar installation','auto insurance','debt relief','weight loss'],
  content: ['ai marketing agency','fractional CTO services','autonomous AI agents','AI customer support']
};
const $ = (id)=>document.getElementById(id);
const esc = (s)=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

/* ── i18n (EN/ES) — same pattern as aideazz.xyz/portfolio: toggle + browser auto-detect ── */
const I18N = {
  en: {
    title:'WHITESPACE — find the ad nobody is running yet',
    byLine:'an AIdeazz agent', byAtlas:'← Atlas radar',
    tagMain:'Every spy tool tells you to <b>copy the ad that\'s already winning</b> — so everyone piles into the same lane. WHITESPACE does the opposite: it maps which angles are <b>saturated</b> and surfaces the adjacent angle <b>almost nobody is running yet</b> — a ranked hypothesis to test, with a sourced evidence trail.',
    tagHonest:'Honest by design: public ad libraries expose <b style="color:var(--mut)">no</b> CTR/spend/ROAS. WHITESPACE measures what\'s <b style="color:var(--mut)">observable</b> — angle saturation — and ranks the gap as a hypothesis, never a guaranteed winner.',
    modeMb:'Ad angles <span>· media buyer</span>', modeCt:'Content angles <span>· AIdeazz engine</span>',
    phMedia:'Enter a vertical or offer — e.g. medicare advantage, solar, auto insurance',
    phContent:'Enter a topic you want to own — e.g. ai marketing agency, fractional CTO services',
    go:'Find the whitespace',
    recLab:'▸ Recommended whitespace angle',
    hAdcopy:'Launch-ready ad copy', hLp:'Landing-page concept',
    hBlog:'Blog brief — drops into your Dev.to / aideazz.xyz pipeline',
    hSocial:'Social atoms — drop into Buffer', hHub:'HubSpot campaign angle',
    hLanes:'Crowded lanes — what to avoid', hAlts:'Other whitespace bets',
    hEv:'Evidence trail — live ads behind the call',
    trackP1:'If this market is worth watching, you can add', trackP2:'to Atlas radar for daily scoring and campaign export.',
    trackBtn:'Add to Atlas radar',
    trackSub:'Optional · daily refresh at 9 AM Panama · one-shot discovery stays on this page',
    how1:'Pick a vertical or offer — Atlas points its radar at that market.',
    how2:'It mines the live ad libraries via Bright Data and deconstructs every running ad into its angle.',
    how3:'You get the open angle almost nobody is running — ranked, with a clickable evidence trail.',
    footnote:'Public ad-transparency data only · <b style="color:var(--mut)">One-shot discovery</b> — not daily tracking. To watch a market over time, use <b style="color:var(--acc)">Add to Atlas radar</b> at the bottom of your results · part of the <a href="atlas.html">Atlas Shifted</a> engine · <a href="https://aideazz.xyz/portfolio" target="_blank" rel="noopener">aideazz.xyz/portfolio ↗</a>',
    confidence:'confidence', owns:'owns', borrows:'borrows proven psychology from →',
    hero:'HERO', keyword:'KEYWORD', xhook:'X thread hook',
    noEvidence:'No live evidence in this run.', scanned:'scanned', creatives:'creatives',
    connecting:'connecting…', streamClosed:'stream closed',
    noteCopyLang:'',
  },
  es: {
    title:'WHITESPACE — encuentra el anuncio que nadie está publicando todavía',
    byLine:'un agente de AIdeazz', byAtlas:'← Radar Atlas',
    tagMain:'Todas las herramientas de espionaje te dicen que <b>copies el anuncio que ya está ganando</b> — y todos terminan en el mismo carril. WHITESPACE hace lo contrario: mapea qué ángulos están <b>saturados</b> y revela el ángulo adyacente que <b>casi nadie está usando todavía</b> — una hipótesis clasificada para probar, con evidencia verificable.',
    tagHonest:'Honesto por diseño: las bibliotecas públicas de anuncios <b style="color:var(--mut)">no</b> exponen CTR/gasto/ROAS. WHITESPACE mide lo <b style="color:var(--mut)">observable</b> — la saturación de ángulos — y clasifica la brecha como hipótesis, nunca como ganador garantizado.',
    modeMb:'Ángulos de anuncios <span>· media buyer</span>', modeCt:'Ángulos de contenido <span>· motor AIdeazz</span>',
    phMedia:'Escribe un vertical u oferta — ej. seguros de auto, paneles solares, medicare',
    phContent:'Escribe un tema que quieras dominar — ej. agencia de marketing con IA, CTO fraccional',
    go:'Encontrar el whitespace',
    recLab:'▸ Ángulo whitespace recomendado',
    hAdcopy:'Copy de anuncio listo para lanzar', hLp:'Concepto de landing page',
    hBlog:'Brief de blog — para tu pipeline Dev.to / aideazz.xyz',
    hSocial:'Átomos sociales — listos para Buffer', hHub:'Ángulo de campaña HubSpot',
    hLanes:'Carriles saturados — qué evitar', hAlts:'Otras apuestas whitespace',
    hEv:'Evidencia — anuncios reales detrás del análisis',
    trackP1:'Si este mercado vale la pena vigilarlo, puedes añadir', trackP2:'al radar Atlas para scoring diario y exportación de campañas.',
    trackBtn:'Añadir al radar Atlas',
    trackSub:'Opcional · actualización diaria a las 9 AM Panamá · el descubrimiento único se queda en esta página',
    how1:'Elige un vertical u oferta — Atlas apunta su radar a ese mercado.',
    how2:'Extrae las bibliotecas de anuncios en vivo vía Bright Data y descompone cada anuncio activo en su ángulo.',
    how3:'Obtienes el ángulo abierto que casi nadie usa — clasificado, con evidencia clicable.',
    footnote:'Solo datos públicos de transparencia publicitaria · <b style="color:var(--mut)">Descubrimiento único</b> — no es seguimiento diario. Para vigilar un mercado en el tiempo, usa <b style="color:var(--acc)">Añadir al radar Atlas</b> al final de tus resultados · parte del motor <a href="atlas.html">Atlas Shifted</a> · <a href="https://aideazz.xyz/portfolio" target="_blank" rel="noopener">aideazz.xyz/portfolio ↗</a>',
    confidence:'confianza', owns:'domina', borrows:'toma psicología probada de →',
    hero:'HERO', keyword:'PALABRA CLAVE', xhook:'Gancho de hilo X',
    noEvidence:'Sin evidencia en vivo en esta corrida.', scanned:'escaneados', creatives:'creativos',
    connecting:'conectando…', streamClosed:'conexión cerrada',
    noteCopyLang:'Nota: el copy creativo se genera en inglés (mercado de anuncios de EE.UU.).',
  }
};
let LANG = localStorage.getItem('ws_lang') || ((navigator.language||'').toLowerCase().startsWith('es') ? 'es' : 'en');
const t = (k)=> (I18N[LANG] && I18N[LANG][k]!==undefined ? I18N[LANG][k] : I18N.en[k]||k);

function applyLang(){
  document.documentElement.lang = LANG;
  document.title = t('title');
  $('byLine').textContent = t('byLine');
  $('byAtlas').textContent = t('byAtlas');
  $('tagMain').innerHTML = t('tagMain');
  $('tagHonest').innerHTML = t('tagHonest');
  $('modeMb').innerHTML = t('modeMb');
  $('modeCt').innerHTML = t('modeCt');
  $('go').textContent = t('go');
  $('recLab').textContent = t('recLab');
  $('hAdcopy').textContent = t('hAdcopy');
  $('hLp').textContent = t('hLp');
  $('hBlog').textContent = t('hBlog');
  $('hSocial').textContent = t('hSocial');
  $('hHub').textContent = t('hHub');
  $('hLanes').textContent = t('hLanes');
  $('hAlts').textContent = t('hAlts');
  $('hEv').textContent = t('hEv');
  $('trackP1').textContent = t('trackP1');
  $('trackP2').textContent = t('trackP2');
  $('trackLinkBottom').textContent = t('trackBtn');
  $('trackSub').textContent = t('trackSub');
  $('how1').textContent = t('how1');
  $('how2').textContent = t('how2');
  $('how3').textContent = t('how3');
  $('footnote').innerHTML = t('footnote');
  $('langEN').classList.toggle('on', LANG==='en');
  $('langES').classList.toggle('on', LANG==='es');
  paintChips();
}
$('langEN').onclick=()=>{ LANG='en'; localStorage.setItem('ws_lang','en'); applyLang(); };
$('langES').onclick=()=>{ LANG='es'; localStorage.setItem('ws_lang','es'); applyLang(); };

let mode = 'media_buyer';
function paintChips(){
  const chips=$('chips'); chips.innerHTML='';
  EXAMPLES[mode].forEach(e=>{const c=document.createElement('span');c.className='chip';c.textContent=e;c.onclick=()=>{$('q').value=e;run();};chips.appendChild(c);});
  $('q').placeholder = mode==='content' ? t('phContent') : t('phMedia');
}
document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{
  mode=b.dataset.mode;
  document.querySelectorAll('.mode').forEach(x=>x.classList.toggle('on',x===b));
  paintChips();
});
applyLang();

let running=false;
let lastQuery='';
function run(){
  if(running) return;
  const v=$('q').value.trim();
  if(!v) return;
  lastQuery=v;
  running=true; $('go').disabled=true;
  $('status').style.display='block';
  $('results').style.display='none';
  $('feed').innerHTML=''; $('fill').style.width='0%';
  feed('start',t('connecting'));

  const es=new EventSource('api/run?vertical='+encodeURIComponent(v)+'&mode='+encodeURIComponent(mode));
  es.onmessage=(m)=>{
    let e; try{e=JSON.parse(m.data);}catch{return;}
    if(typeof e.pct==='number') $('fill').style.width=e.pct+'%';
    feed(e.stage,e.message);
    if(e.stage==='done'&&e.data){ render(e.data); es.close(); finish(); }
    if(e.stage==='error'){ feed('error',e.message); es.close(); finish(); }
  };
  es.addEventListener('close',()=>{es.close();finish();});
  es.onerror=()=>{ if(running){feed('error',t('streamClosed'));} es.close(); finish(); };
}
function finish(){ running=false; $('go').disabled=false; }
function feed(stage,msg){
  const d=document.createElement('div');
  const cls = stage==='error'?'er':'st';
  d.innerHTML='<span class="'+cls+'">'+esc(stage)+'</span> · '+esc(msg);
  $('feed').appendChild(d); $('feed').scrollTop=$('feed').scrollHeight;
}

function render(p){
  $('results').style.display='block';
  const r=p.recommendation||{};
  $('recAngle').textContent=r.angle||'—';
  $('recRationale').textContent=r.rationale||'';
  $('recConf').innerHTML=t('confidence')+' <b style="color:var(--acc)">'+(r.confidence||0)+'</b>/100 · '+t('owns')+' <b>'+esc(r.emotion||'—')+'</b> · '+esc(r.hookType||'');
  $('recAdj').innerHTML=(r.adjacentTo&&r.adjacentTo.length)?(t('borrows')+' <b>'+r.adjacentTo.map(esc).join('</b>, <b>')+'</b>'):'';

  const isContent = p.kind==='content';
  document.querySelectorAll('.results .mb').forEach(el=>el.style.display=isContent?'none':'block');
  document.querySelectorAll('.results .ct').forEach(el=>el.style.display=isContent?'block':'none');

  const copyNote = (LANG==='es' && t('noteCopyLang')) ? '<div class="ct" style="color:var(--dim);margin-top:8px">'+t('noteCopyLang')+'</div>' : '';

  if(!isContent){
    $('adcopy').innerHTML=((p.adCopy||[]).map(c=>(
      '<div class="tile"><h3>'+esc(c.headline)+'</h3><div class="ct">'+esc(c.primaryText)+'</div><span class="cta">'+esc(c.cta)+'</span></div>'
    )).join('')||'<div class="ct" style="color:var(--dim)">—</div>')+copyNote;
    const lp=p.landingPage||{};
    $('lp').innerHTML='<h3>'+esc(lp.hook||'—')+'</h3><div class="ct">'+esc(lp.subhead||'')+'<br><br><span style="color:var(--dim)">'+t('hero')+':</span> '+esc(lp.heroConcept||'')+'</div>';
  } else {
    const b=p.blog||{};
    $('blog').innerHTML='<h3>'+esc(b.title||'—')+'</h3><div class="ct"><span style="color:var(--dim)">'+t('keyword')+':</span> '+esc(b.targetKeyword||'')+'<br><br>'+
      (b.outline||[]).map(o=>'• '+esc(o)).join('<br>')+'<br><br><span style="color:var(--dim)">AEO:</span> '+esc(b.aeoHint||'')+'</div>';
    const s=p.social||{};
    $('social').innerHTML=
      '<div class="tile"><h3>LinkedIn</h3><div class="ct">'+esc(s.linkedin||'').replace(/\n/g,'<br>')+'</div></div>'+
      '<div class="tile"><h3>Instagram</h3><div class="ct">'+esc(s.instagram||'')+'</div></div>'+
      '<div class="tile"><h3>'+t('xhook')+'</h3><div class="ct">'+esc(s.xThreadHook||'')+'</div></div>';
    $('hub').innerHTML='<div class="ct">'+esc(p.hubspotCampaignAngle||'—')+'</div>'+copyNote;
  }

  $('lanes').innerHTML=(p.crowdedLanes||[]).map(l=>(
    '<div class="lane"><span class="sat '+esc(l.saturation)+'">'+esc(l.saturation)+'</span>'+
    '<span class="ang">'+esc(l.angle)+' <span style="color:var(--dim)">('+ (l.creativeCount||0) +')</span></span>'+
    '<span class="em">'+esc(l.dominantEmotion||'')+'</span></div>'
  )).join('')||'<div class="ct" style="color:var(--dim)">—</div>';

  const alts=p.alternativeBets||[];
  $('altSec').style.display=alts.length?'block':'none';
  $('alts').innerHTML=alts.map(a=>(
    '<div class="alt"><b>'+esc(a.angle)+'</b> <span class="c">'+(a.confidence||0)+'</span><br>'+esc(a.rationale)+'</div>'
  )).join('');

  $('evidence').innerHTML=(p.evidence||[]).map(e=>(
    '<div class="ev"><b>'+esc(e.advertiser||'unknown')+'</b> — '+esc(e.insight)+'<br>'+
    (e.sourceUrl?('<a href="'+esc(e.sourceUrl)+'" target="_blank" rel="noopener">'+esc(e.sourceUrl).slice(0,72)+'</a>'):'')+'</div>'
  )).join('')||'<div class="ct" style="color:var(--dim)">'+t('noEvidence')+'</div>';

  const m=p.meta||{};
  $('meta').textContent=t('scanned')+' '+(m.creativesScanned||0)+' '+t('creatives')+' · '+((m.sources&&m.sources.join('+'))||'knowledge-mode')+' · '+esc(m.llmProvider||'')+' · '+(m.durationMs||0)+'ms'+(m.degraded?' · DEGRADED':'');
  const deg=$('deg');
  if(m.degraded&&m.notes&&m.notes.length){ deg.style.display='block'; deg.textContent='⚠ '+m.notes.join('  '); }
  else deg.style.display='none';

  if(lastQuery){
    const trackHref='atlas.html?q='+encodeURIComponent(lastQuery)+'&track=1';
    $('trackLinkBottom').href=trackHref;
    $('trackLabel').textContent=lastQuery;
    $('trackCtaBottom').classList.add('show');
  } else {
    $('trackCtaBottom').classList.remove('show');
  }
}

$('go').onclick=run;
$('q').addEventListener('keydown',e=>{if(e.key==='Enter')run();});
</script>
</body>
</html>
